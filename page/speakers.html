<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Speakers & Soundbars</title>
    <link rel="icon" href="../img/favicon.jfif" type="image/png" />
    
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/menu.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="../css/speakers.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <script src="../js/jquery-3.7.1.min.js"></script>
    <script src="../js/jquery-ui.min.js"></script>
  </head>
  <body>
    <div id="wrap">
      <div id="menu-area"></div>

      <main id="sp-page">
        <section id="sp-speaker" class="sp-sec">
          <div class="inner">
            <div class="sp-head">
              <span class="sp-kicker">SPEAKERS</span>
              <h2 class="sp-title" id="speakerName">TSP Moon Speaker</h2>
              <p class="sp-desc" id="speakerDesc">
                공간을 채우는 깊고 부드러운 사운드
              </p>
              <strong class="sp-price" id="speakerPrice">₩319,000</strong>
            </div>

            <div class="swiper sp-swiper speakerSwiper">
              <div class="swiper-wrapper">
                <div
                  class="swiper-slide sp-slide"
                  data-name="TSP Moon Speaker"
                  data-desc="공간을 채우는 깊고 부드러운 사운드"
                  data-price="₩319,000"
                >
                  <img src="../img/speaker01.png" alt="TSP Moon Speaker" />
                </div>

                <div
                  class="swiper-slide sp-slide"
                  data-name="TSP Linen Tower"
                  data-desc="세련된 실루엣과 풍부한 입체 음향"
                  data-price="₩459,000"
                >
                  <img src="../img/speaker02.png" alt="TSP Linen Tower" />
                </div>

                <div
                  class="swiper-slide sp-slide"
                  data-name="TSP Black Wood"
                  data-desc="묵직한 저음과 안정적인 밸런스를 담은 사운드"
                  data-price="₩389,000"
                >
                  <img src="../img/speaker03.png" alt="TSP Black Wood" />
                </div>

                <div
                class="swiper-slide sp-slide"
                data-name="TSP Nordic Wood Speaker"
                data-desc="우드 베이스와 패브릭 마감이 어우러진 깊고 따뜻한 공간형 사운드"
                data-price="₩389,000"
                >
                <img src="../img/hotthing03.png" alt="TSP Nordic Wood Speaker" />
                </div>

                <div
                  class="swiper-slide sp-slide"
                  data-name="TSP Silver Cone"
                  data-desc="미니멀한 조형미와 또렷한 고해상도 사운드"
                  data-price="₩429,000"
                >
                  <img src="../img/speaker04.png" alt="TSP Silver Cone" />
                </div>

                <div
                  class="swiper-slide sp-slide"
                  data-name="TSP Dual Silver"
                  data-desc="입체적인 구조로 완성한 선명하고 깊은 울림"
                  data-price="₩479,000"
                >
                  <img src="../img/speaker05.png" alt="TSP Dual Silver" />
                </div>

                <div
                  class="swiper-slide sp-slide"
                  data-name="TSP Cube Bass"
                  data-desc="컴팩트한 디자인 안에 강한 저음을 담은 퍼포먼스"
                  data-price="₩349,000"
                >
                  <img src="../img/speaker06.png" alt="TSP Cube Bass" />
                </div>

                <div
                  class="swiper-slide sp-slide"
                  data-name="TSP Signature Tower"
                  data-desc="프리미엄 존재감과 압도적인 공간감을 전하는 사운드"
                  data-price="₩529,000"
                >
                  <img src="../img/speaker07.png" alt="TSP Signature Tower" />
                </div>
            </div>
          </div>
        </section>

        <section id="sp-soundbar" class="sp-sec">
          <div class="inner">
            <div class="sp-head">
              <span class="sp-kicker">SOUNDBARS</span>
              <h2 class="sp-title" id="soundbarName">TSP Slim Soundbar</h2>
              <p class="sp-desc" id="soundbarDesc">
                얇고 세련된 디자인에 풍부한 입체 사운드
              </p>
              <strong class="sp-price" id="soundbarPrice">₩429,000</strong>
            </div>

            <div class="swiper sp-swiper soundbarSwiper">
              <div class="swiper-wrapper">
                <div
                class="swiper-slide sp-slide"
                data-name="TSP Deep Circle Bar"
                data-desc="원형 우퍼 디테일과 묵직한 저음을 담은 프리미엄 홈시어터 사운드"
                data-price="₩429,000"
                >
                <img src="../img/soundbar01.png" alt="TSP Deep Circle Bar" />
                </div>

                <div
                class="swiper-slide sp-slide"
                data-name="TSP Home Black Bar"
                data-desc="슬림한 바디에 선명한 대사 전달과 안정적인 공간감을 더한 사운드"
                data-price="₩389,000"s
                >
                <img src="../img/soundbar02.png" alt="TSP Home Black Bar" />
                </div>

                <div
                class="swiper-slide sp-slide"
                data-name="TSP Curve Cinema Bar"
                data-desc="곡선형 실루엣과 균형 잡힌 출력으로 몰입감을 높인 시네마 사운드"
                data-price="₩459,000"
                >
                <img src="../img/soundbar03.png" alt="TSP Curve Cinema Bar" />
                </div>

                <div
                class="swiper-slide sp-slide"
                data-name="TSP Blade Slim Bar"
                data-desc="얇고 긴 디자인에 또렷한 디테일과 넓은 스테이지감을 담은 사운드"
                data-price="₩479,000"
                >
                <img src="../img/hotthing04.png" alt="TSP Blade Slim Bar" />
                </div>

                <div
                class="swiper-slide sp-slide"
                data-name="TSP Soft Edge Bar"
                data-desc="부드러운 라운드 마감과 풍부한 중저음이 조화를 이루는 데일리 사운드"
                data-price="₩409,000"
                >
                <img src="../img/soundbar04.png" alt="TSP Soft Edge Bar" />
                </div>

                <div
                class="swiper-slide sp-slide"
                data-name="TSP Frame Silver Bar"
                data-desc="메탈 포인트와 선명한 직진성으로 완성한 깔끔한 프리미엄 사운드"
                data-price="₩499,000"
                >
                <img src="../img/soundbar05.png" alt="TSP Frame Silver Bar" />
                </div>

                <div
                class="swiper-slide sp-slide"
                data-name="TSP Minimal Black Bar"
                data-desc="군더더기 없는 미니멀 바디에 깊고 단단한 울림을 담은 사운드"
                data-price="₩369,000"
                >
                <img src="../img/soundbar06.png" alt="TSP Minimal Black Bar" />
                </div>

                <div
                class="swiper-slide sp-slide"
                data-name="TSP Balance Gray Bar"
                data-desc="정제된 그레이 톤과 안정적인 밸런스로 공간을 채우는 입체 사운드"
                data-price="₩519,000"
                >
                <img src="../img/soundbar07.png" alt="TSP Balance Gray Bar" />
                </div>
              </div>
            </div>
          </div>
        </section>
      </main>

      <div id="footer-area"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="../js/ngo.js"></script>

    <script>
      $("#menu-area").load("menu.html", function () {
        initMenu();
      });

      $("#footer-area").load("footer.html");
    </script>

    <script src="../js/speakers.js"></script>
  </body>
</html>
